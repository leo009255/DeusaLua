<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Templo da Deusa da Lua — Jogável</title>

<style>
:root {
  --night: #07040c;
  --violet: #24102f;
  --violet-2: #4e2561;
  --gold: #f0c56f;
  --ivory: #f5e8ca;
  --text: #fff8ff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  min-height: 100%;
  background: var(--night);
  color: var(--text);
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
  touch-action: none;
}

body {
  display: grid;
  place-items: center;
}

button {
  font: inherit;
}

.temple {
  position: relative;
  width: min(100vw, 480px);
  height: 100dvh;
  min-height: 640px;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(168, 104, 194, 0.16), transparent 50%),
    linear-gradient(180deg, #0d0618 0%, #07040c 40%, #0a0510 100%);
}

.temple::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 90;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 43%, rgba(0, 0, 0, 0.62));
}

.temple.paused * {
  animation-play-state: paused !important;
}

.top {
  position: relative;
  z-index: 100;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 16px;
  background: rgba(7, 4, 12, 0.9);
  border-bottom: 1px solid #3a1e45;
  backdrop-filter: blur(8px);
}

.brand {
  color: var(--gold);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.status {
  max-width: 42%;
  color: #cdb8d6;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sanctum {
  position: relative;
  height: calc(100dvh - 50px);
  min-height: 590px;
  overflow: hidden;
}

/* ===== LUA ===== */
.moon-container {
  position: absolute;
  left: 50%;
  top: 28px;
  z-index: 5;
  transform: translateX(-50%);
}

.moon {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5), transparent 8%),
    radial-gradient(circle at 65% 65%, rgba(136,113,83,0.2), transparent 12%),
    linear-gradient(145deg, #f6e7c5, #c9a96e);
  box-shadow:
    0 0 30px rgba(245,225,188,0.4),
    0 0 80px rgba(155,91,181,0.25),
    inset -10px -10px 20px rgba(0,0,0,0.1);
  animation: moonPulse 4s ease-in-out infinite;
}

@keyframes moonPulse {
  50% {
    transform: scale(1.03);
    filter: brightness(1.08);
  }
}

.rune-ring {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 180px;
  height: 180px;
  transform: translate(-50%, -50%);
  border: 1px dashed rgba(241,197,111,0.4);
  border-radius: 50%;
  animation: spin 20s linear infinite;
}

.rune-ring::before {
  content: "✦ ☾ ✧ ☽ ✦ ☾ ✧ ☽";
  position: absolute;
  inset: 10px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(146,74,165,0.35);
  border-radius: 50%;
  color: rgba(241,197,111,0.6);
  font-size: 11px;
  letter-spacing: 3px;
}

.rune-ring::after {
  content: "";
  position: absolute;
  inset: 30px;
  border: 1px dotted rgba(146,74,165,0.25);
  border-radius: 50%;
}

@keyframes spin {
  from {
    transform: translate(-50%, -50%) rotate(0deg);
  }
  to {
    transform: translate(-50%, -50%) rotate(360deg);
  }
}

.light-ray {
  position: absolute;
  left: 50%;
  top: 120px;
  z-index: 4;
  width: 220px;
  height: 410px;
  transform: translateX(-50%);
  clip-path: polygon(40% 0, 60% 0, 100% 100%, 0 100%);
  background: linear-gradient(
    180deg,
    rgba(239,224,192,0.13),
    rgba(111,58,131,0.05) 60%,
    transparent
  );
  filter: blur(3px);
  animation: rayPulse 5s ease-in-out infinite;
}

@keyframes rayPulse {
  50% {
    opacity: 0.58;
  }
}

/* ===== ARQUITETURA ===== */
.column {
  position: absolute;
  top: 80px;
  bottom: 180px;
  z-index: 3;
  width: 28px;
  border: 1px solid #1a0d20;
  background: linear-gradient(90deg, #0f0814, #3d1f4a 50%, #0f0814);
}

.column::before {
  content: "";
  position: absolute;
  left: -6px;
  right: -6px;
  top: -18px;
  height: 20px;
  border: 1px solid #0a050e;
  border-radius: 2px;
  background: linear-gradient(#4a2660, #1a0d22);
}

.column::after {
  content: "";
  position: absolute;
  left: -8px;
  right: -8px;
  bottom: -12px;
  height: 14px;
  border: 1px solid #0a050e;
  border-radius: 2px;
  background: #2a1535;
}

.column.left {
  left: 25px;
}

.column.right {
  right: 25px;
}

.banner {
  position: absolute;
  top: 78px;
  z-index: 4;
  width: 45px;
  height: 150px;
  transform-origin: 50% 0;
  clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
  border-top: 3px solid #b78a52;
  background: linear-gradient(90deg, #2d1240, #5a2470, #2d1240);
  opacity: 0.85;
  animation: bannerSway 5s ease-in-out infinite;
}

.banner::after {
  content: "☾";
  position: absolute;
  left: 50%;
  top: 45px;
  transform: translateX(-50%);
  color: #efc66f;
  font-size: 28px;
  text-shadow: 0 0 12px rgba(240,197,111,0.4);
}

.banner.left {
  left: 55px;
  animation-delay: -1.5s;
}

.banner.right {
  right: 55px;
  animation-delay: -3.5s;
}

@keyframes bannerSway {
  0%,
  100% {
    transform: rotate(-2deg);
  }
  50% {
    transform: rotate(2deg);
  }
}

/* ===== ALTAR ===== */
.altar {
  position: absolute;
  left: 50%;
  bottom: 140px;
  z-index: 6;
  width: 280px;
  height: 90px;
  transform: translateX(-50%);
}

.step {
  position: absolute;
  left: 50%;
  height: 24px;
  transform: translateX(-50%);
  border: 1px solid #09050d;
  background: linear-gradient(#3a2045, #120818);
  box-shadow: inset 0 1px rgba(168,99,184,0.2);
}

.step.s1 {
  width: 280px;
  bottom: 0;
}

.step.s2 {
  width: 230px;
  bottom: 22px;
}

.step.s3 {
  width: 180px;
  bottom: 44px;
}

.sigil {
  position: absolute;
  left: 50%;
  bottom: 68px;
  width: 140px;
  height: 24px;
  transform: translateX(-50%);
  border: 2px solid rgba(241,197,111,0.5);
  border-radius: 50%;
  box-shadow:
    0 0 15px rgba(241,197,111,0.2),
    inset 0 0 15px rgba(120,57,139,0.15);
  animation: sigilPulse 3s ease-in-out infinite;
}

@keyframes sigilPulse {
  50% {
    opacity: 1;
    transform: translateX(-50%) scale(1.05);
  }
}

/* ===== LUZES ===== */
.candle-row {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 185px;
  z-index: 8;
  pointer-events: none;
}

.candle {
  position: absolute;
  width: 7px;
  height: 36px;
  border-radius: 2px 2px 0 0;
  background: linear-gradient(90deg, #bfae89, #fff1cd, #a89473);
}

.candle::after {
  content: "";
  position: absolute;
  left: 1px;
  top: -10px;
  width: 5px;
  height: 12px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  transform-origin: 50% 100%;
  background: radial-gradient(ellipse at 50% 80%, #fff5a8, #ffd069, #ff9f35);
  box-shadow:
    0 0 8px #ffb33f,
    0 0 16px rgba(255,179,69,0.6);
  animation: flicker 0.15s steps(3) infinite alternate;
}

.c1 {
  left: 35px;
  height: 28px;
}

.c2 {
  left: 65px;
}

.c3 {
  left: 95px;
  height: 24px;
}

.c4 {
  right: 35px;
  height: 28px;
}

.c5 {
  right: 65px;
}

.c6 {
  right: 95px;
  height: 24px;
}

@keyframes flicker {
  to {
    transform: scaleY(1.15) scaleX(0.85);
    opacity: 0.85;
  }
}

.brazier {
  position: absolute;
  bottom: 210px;
  z-index: 7;
  width: 40px;
  height: 48px;
}

.brazier.left {
  left: 30px;
}

.brazier.right {
  right: 30px;
}

.bowl {
  position: absolute;
  bottom: 0;
  width: 40px;
  height: 16px;
  border: 1px solid #09050d;
  border-radius: 0 0 20px 20px;
  background: linear-gradient(#8d6b3a, #26180e);
}

.flame {
  position: absolute;
  left: 10px;
  bottom: 10px;
  width: 20px;
  height: 32px;
  transform-origin: 50% 100%;
  background: radial-gradient(
    ellipse at 50% 75%,
    #fff0a1,
    #ffb13c 30%,
    #8f2f71 60%,
    transparent 75%
  );
  filter: drop-shadow(0 0 8px #ff9f35);
  animation: bigFlame 0.6s ease-in-out infinite alternate;
}

@keyframes bigFlame {
  to {
    transform: scaleY(1.2) scaleX(0.9);
  }
}

/* ===== PERSONAGEM ===== */
.character-wrap {
  position: absolute;
  left: 50%;
  bottom: 195px;
  z-index: 20;
  width: clamp(154px, 40vw, 192px);
  aspect-ratio: 2 / 3;
  transform: translateX(-50%);
  transform-origin: 50% 100%;
  filter: drop-shadow(0 12px 8px rgba(0,0,0,0.55));
  will-change: left, bottom;
}

#spriteCanvas {
  display: block;
  width: 100%;
  height: 100%;
  background: transparent;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.char-shadow {
  position: absolute;
  left: 50%;
  bottom: 188px;
  z-index: 12;
  width: 88px;
  height: 17px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(0,0,0,0.52), transparent 72%);
  will-change: left, bottom, transform;
}

/* ===== PARTÍCULAS ===== */
.particles {
  position: absolute;
  inset: 0;
  z-index: 30;
  overflow: hidden;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  opacity: 0;
  background: var(--gold);
  box-shadow: 0 0 8px rgba(240,197,111,0.8);
  animation: particleFloat linear forwards;
}

@keyframes particleFloat {
  0% {
    opacity: 0;
    transform: translateY(0) scale(0.2);
  }
  12%,
  88% {
    opacity: 0.85;
  }
  100% {
    opacity: 0;
    transform: translateY(-280px) scale(1.7);
  }
}

/* ===== INTERFACE ===== */
.altar-hint {
  position: absolute;
  left: 50%;
  top: 210px;
  z-index: 34;
  padding: 5px 10px;
  transform: translateX(-50%) translateY(-4px);
  border: 1px solid rgba(240,197,111,0.32);
  border-radius: 999px;
  background: rgba(10,5,16,0.82);
  color: var(--gold);
  font-size: 10px;
  opacity: 0;
  transition: 0.25s ease;
  pointer-events: none;
}

.altar-hint.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.phrase-box {
  position: absolute;
  left: 50%;
  bottom: 150px;
  z-index: 60;
  width: 85%;
  max-width: 390px;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  transform: translateX(-50%);
  border: 1px solid rgba(241,197,111,0.25);
  border-radius: 8px;
  background: rgba(10,5,16,0.86);
  text-align: center;
  backdrop-filter: blur(8px);
}

.phrase-text {
  color: var(--ivory);
  font-size: 12px;
  font-style: italic;
  line-height: 1.5;
  animation: phraseIn 0.42s ease forwards;
}

@keyframes phraseIn {
  from {
    opacity: 0;
    transform: translateY(5px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.controls {
  position: absolute;
  left: 50%;
  bottom: 101px;
  z-index: 65;
  display: flex;
  gap: 7px;
  transform: translateX(-50%);
}

.btn {
  padding: 8px 11px;
  border: 1px solid rgba(241,197,111,0.4);
  border-radius: 6px;
  background: rgba(20,10,30,0.84);
  color: var(--gold);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  backdrop-filter: blur(5px);
}

.btn:active,
.btn.active {
  transform: scale(0.96);
  background: rgba(241,197,111,0.2);
}

.touch-controls {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 10px;
  z-index: 70;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 14px;
  pointer-events: none;
}

.dpad {
  position: relative;
  width: 116px;
  height: 84px;
  pointer-events: auto;
}

.touch-btn,
.action-btn {
  display: grid;
  place-items: center;
  border: 1px solid rgba(241,197,111,0.42);
  background: rgba(21,10,31,0.82);
  color: var(--gold);
  box-shadow: 0 6px 16px rgba(0,0,0,0.28);
  user-select: none;
  cursor: pointer;
  backdrop-filter: blur(7px);
}

.touch-btn {
  position: absolute;
  width: 38px;
  height: 38px;
  border-radius: 9px;
  font-size: 17px;
}

.touch-btn.up {
  left: 39px;
  top: 0;
}

.touch-btn.left {
  left: 0;
  top: 39px;
}

.touch-btn.down {
  left: 39px;
  top: 39px;
}

.touch-btn.right {
  left: 78px;
  top: 39px;
}

.touch-actions {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  pointer-events: auto;
}

.action-btn {
  width: 58px;
  height: 52px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 800;
}

.action-btn.primary {
  width: 68px;
  height: 68px;
  color: #1b0f23;
  background: linear-gradient(145deg, #ffe6a7, #c79039);
  border-color: #fff0bf;
}

.touch-btn:active,
.touch-btn.active,
.action-btn:active,
.action-btn.active {
  transform: scale(0.94);
  background: rgba(240,197,111,0.22);
}

.loading {
  position: absolute;
  inset: 0;
  z-index: 120;
  display: grid;
  place-items: center;
  background: rgba(7,4,12,0.92);
  color: var(--gold);
  font-size: 12px;
  letter-spacing: 0.1em;
  transition: opacity 0.3s ease;
}

.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

@media (hover: hover) and (pointer: fine) {
  .btn:hover,
  .touch-btn:hover,
  .action-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 13px rgba(240,197,111,0.24);
  }
}

@media (max-height: 720px) {
  .moon-container {
    top: 12px;
    transform: translateX(-50%) scale(0.84);
  }

  .light-ray {
    top: 88px;
  }

  .character-wrap {
    width: clamp(138px, 35vw, 170px);
  }

  .phrase-box {
    bottom: 141px;
    min-height: 44px;
    padding: 9px 13px;
  }

  .controls {
    bottom: 96px;
  }
}
</style>
</head>

<body>
<main class="temple" id="temple">
  <header class="top">
    <div class="brand">✦ Templo da Deusa da Lua ✦</div>
    <div class="status" id="status">Carregando...</div>
  </header>

  <section class="sanctum" id="sanctum">
    <div class="moon-container">
      <div class="moon"></div>
      <div class="rune-ring"></div>
    </div>

    <div class="light-ray"></div>

    <div class="column left"></div>
    <div class="column right"></div>
    <div class="banner left"></div>
    <div class="banner right"></div>

    <div class="altar" id="altar">
      <div class="step s1"></div>
      <div class="step s2"></div>
      <div class="step s3"></div>
      <div class="sigil"></div>
    </div>

    <div class="candle-row">
      <div class="candle c1"></div>
      <div class="candle c2"></div>
      <div class="candle c3"></div>
      <div class="candle c4"></div>
      <div class="candle c5"></div>
      <div class="candle c6"></div>
    </div>

    <div class="brazier left">
      <div class="bowl"></div>
      <div class="flame"></div>
    </div>

    <div class="brazier right">
      <div class="bowl"></div>
      <div class="flame"></div>
    </div>

    <div class="char-shadow" id="charShadow"></div>

    <div class="character-wrap" id="characterWrap">
      <canvas
        id="spriteCanvas"
        width="192"
        height="288"
        aria-label="Personagem jogável"
      ></canvas>
    </div>

    <div class="particles" id="particles"></div>

    <div class="altar-hint" id="altarHint">E ou Agir para oferecer</div>

    <div class="phrase-box">
      <div class="phrase-text" id="phraseText">
        Bem-vindo ao Templo da Deusa da Lua...
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="contemplateBtn" type="button">✧ Contemplar</button>
      <button class="btn" id="offerBtn" type="button">🔥 Oferecer</button>
      <button class="btn" id="pauseBtn" type="button">⏸ Pausar</button>
    </div>

    <div class="touch-controls" aria-label="Controles móveis">
      <div class="dpad">
        <button class="touch-btn up" data-control="up" type="button">▲</button>
        <button class="touch-btn left" data-control="left" type="button">◀</button>
        <button class="touch-btn down" data-control="down" type="button">▼</button>
        <button class="touch-btn right" data-control="right" type="button">▶</button>
      </div>

      <div class="touch-actions">
        <button class="action-btn" data-control="jump" type="button">Pular</button>
        <button class="action-btn primary" id="actionBtn" type="button">Agir</button>
      </div>
    </div>

    <div class="loading" id="loading">CARREGANDO SPRITES...</div>
  </section>
</main>

<script>
"use strict";

const FRAME_WIDTH = 192;
const FRAME_HEIGHT = 288;

const animationDefinitions = {
  idle: {
    source: "sprites/idle.png",
    frames: 8,
    fps: 7,
    loop: true
  },
  walk: {
    source: "sprites/walk.png",
    frames: 8,
    fps: 9,
    loop: true
  },
  jump: {
    source: "sprites/jump.png",
    frames: 6,
    fps: 8,
    loop: false
  },
  offer: {
    source: "sprites/offer.png",
    frames: 8,
    fps: 8,
    loop: false
  }
};

const phrases = [
  "Bem-vindo ao Templo da Deusa da Lua...",
  "A lua observa todos os segredos do coração.",
  "Na escuridão, encontre sua própria luz.",
  "Cada fase da lua ensina: até na escuridão há beleza.",
  "A devoção é a chama que nunca se apaga.",
  "Ela ouve o que você não diz em voz alta.",
  "O templo pulsa com a energia da noite eterna.",
  "Acalme sua mente. A deusa está presente.",
  "Mesmo nas sombras mais profundas, há um brilho esperando.",
  "Sua fé é a ponte entre o mundo e o divino."
];

const temple = document.getElementById("temple");
const sanctum = document.getElementById("sanctum");
const charWrap = document.getElementById("characterWrap");
const charShadow = document.getElementById("charShadow");
const canvas = document.getElementById("spriteCanvas");
const context = canvas.getContext("2d", { alpha: true });
const phraseText = document.getElementById("phraseText");
const statusText = document.getElementById("status");
const altarHint = document.getElementById("altarHint");
const actionBtn = document.getElementById("actionBtn");
const loading = document.getElementById("loading");

context.imageSmoothingEnabled = false;

const input = {
  left: false,
  right: false,
  up: false,
  down: false
};

const player = {
  x: 0,
  groundBottom: 195,
  jumpOffset: 0,
  jumpVelocity: 0,
  jumping: false,
  facing: 1,
  speedX: 165,
  speedY: 100
};

const game = {
  loaded: false,
  paused: false,
  offering: false,
  nearAltar: false,
  wasNearAltar: false,
  phraseIndex: 0,
  lastTime: performance.now()
};

const animation = {
  name: "idle",
  frame: 0,
  timer: 0
};

const sprites = {};

function loadImage(source) {
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(image);
    image.onerror = () => reject(new Error(`Não foi possível carregar ${source}`));
    image.src = source;
  });
}

async function loadSprites() {
  for (const [name, definition] of Object.entries(animationDefinitions)) {
    sprites[name] = {
      ...definition,
      image: await loadImage(definition.source)
    };
  }

  game.loaded = true;
  loading.classList.add("hidden");
  statusText.textContent = "Contemplando...";
  resetPosition();
}

function resetPosition() {
  player.x = sanctum.clientWidth / 2;
  player.groundBottom = 195;
  renderPlayer();
}

function setAnimation(name, restart = false) {
  if (!game.loaded) return;
  if (!restart && animation.name === name) return;

  animation.name = name;
  animation.frame = 0;
  animation.timer = 0;
}

function updateAnimation(deltaTime) {
  if (!game.loaded || game.paused) return;

  if (animation.name === "jump") {
    if (player.jumpVelocity > 270) {
      animation.frame = 0;
    } else if (player.jumpVelocity > 90) {
      animation.frame = 1;
    } else if (player.jumpVelocity > -70) {
      animation.frame = 2;
    } else if (player.jumpVelocity > -240) {
      animation.frame = 3;
    } else if (player.jumpOffset > 18) {
      animation.frame = 4;
    } else {
      animation.frame = 5;
    }
    return;
  }

  const current = sprites[animation.name];
  animation.timer += deltaTime;
  const frameDuration = 1 / current.fps;

  while (animation.timer >= frameDuration) {
    animation.timer -= frameDuration;
    animation.frame += 1;

    if (animation.frame >= current.frames) {
      if (current.loop) {
        animation.frame = 0;
      } else {
        animation.frame = current.frames - 1;

        if (animation.name === "offer") {
          game.offering = false;
          setAnimation("idle", true);
        }
      }
    }
  }
}

function drawPlayer() {
  if (!game.loaded) return;

  const current = sprites[animation.name];
  const sourceX = animation.frame * FRAME_WIDTH;

  context.clearRect(0, 0, FRAME_WIDTH, FRAME_HEIGHT);
  context.save();

  if (player.facing < 0) {
    context.translate(FRAME_WIDTH, 0);
    context.scale(-1, 1);
  }

  context.drawImage(
    current.image,
    sourceX,
    0,
    FRAME_WIDTH,
    FRAME_HEIGHT,
    0,
    0,
    FRAME_WIDTH,
    FRAME_HEIGHT
  );

  context.restore();
}

function renderPlayer() {
  charWrap.style.left = `${player.x}px`;
  charWrap.style.bottom = `${player.groundBottom + player.jumpOffset}px`;

  charShadow.style.left = `${player.x}px`;
  charShadow.style.bottom = `${player.groundBottom - 5}px`;

  const shadowScale = Math.max(0.64, 1 - player.jumpOffset / 260);
  const shadowOpacity = Math.max(0.18, 0.55 - player.jumpOffset / 330);

  charShadow.style.transform =
    `translateX(-50%) scaleX(${shadowScale})`;
  charShadow.style.opacity = String(shadowOpacity);
}

function updatePlayer(deltaTime) {
  if (!game.loaded || game.paused || game.offering) return;

  let horizontal = 0;
  let vertical = 0;

  if (input.left) horizontal -= 1;
  if (input.right) horizontal += 1;
  if (input.up) vertical += 1;
  if (input.down) vertical -= 1;

  if (horizontal !== 0 && vertical !== 0) {
    horizontal *= Math.SQRT1_2;
    vertical *= Math.SQRT1_2;
  }

  player.x += horizontal * player.speedX * deltaTime;

  if (!player.jumping) {
    player.groundBottom += vertical * player.speedY * deltaTime;
  }

  const minimumX = 45;
  const maximumX = sanctum.clientWidth - 45;
  player.x = Math.max(minimumX, Math.min(maximumX, player.x));
  player.groundBottom = Math.max(
    150,
    Math.min(Math.min(325, sanctum.clientHeight - 175), player.groundBottom)
  );

  if (horizontal < 0) player.facing = -1;
  if (horizontal > 0) player.facing = 1;

  if (player.jumping) {
    player.jumpVelocity -= 980 * deltaTime;
    player.jumpOffset += player.jumpVelocity * deltaTime;

    if (player.jumpOffset <= 0) {
      player.jumpOffset = 0;
      player.jumpVelocity = 0;
      player.jumping = false;
    }
  }

  const altarCenterX = sanctum.clientWidth / 2;

  game.nearAltar =
    Math.abs(player.x - altarCenterX) < 78 &&
    player.groundBottom >= 165 &&
    player.groundBottom <= 245;

  altarHint.classList.toggle("visible", game.nearAltar);
  actionBtn.textContent = game.nearAltar ? "Ofertar" : "Agir";

  if (game.nearAltar && !game.wasNearAltar) {
    showPhrase("✨ Você está diante do altar. A deusa observa seus passos.");
    statusText.textContent = "Diante do altar ✦";
  }

  if (!game.nearAltar && game.wasNearAltar) {
    statusText.textContent = "Explorando...";
  }

  game.wasNearAltar = game.nearAltar;

  const moving = horizontal !== 0 || vertical !== 0;

  if (player.jumping) {
    setAnimation("jump");
  } else if (moving) {
    setAnimation("walk");
  } else {
    setAnimation("idle");
  }
}

function jump() {
  if (
    !game.loaded ||
    game.paused ||
    game.offering ||
    player.jumping
  ) {
    return;
  }

  player.jumping = true;
  player.jumpVelocity = 430;
  setAnimation("jump", true);
}

function showPhrase(text) {
  phraseText.style.animation = "none";
  void phraseText.offsetWidth;
  phraseText.textContent = text;
  phraseText.style.animation = "phraseIn 0.42s ease forwards";
}

function contemplate() {
  if (!game.loaded || game.paused) return;

  game.phraseIndex = (game.phraseIndex + 1) % phrases.length;
  showPhrase(phrases[game.phraseIndex]);
  statusText.textContent = "Contemplando...";
  spawnParticles(7, 50, 33);
}

function offer() {
  if (!game.loaded || game.paused || game.offering) return;

  if (!game.nearAltar) {
    showPhrase("Aproxime-se do altar antes de realizar a oferenda.");
    statusText.textContent = "O altar está distante";
    return;
  }

  game.offering = true;
  setAnimation("offer", true);
  showPhrase("Sua oferenda foi aceita. A deusa sorri sobre você.");
  statusText.textContent = "Oferenda realizada ✦";
  spawnParticles(22, 50, 43);

  document.querySelectorAll(".flame").forEach((flame) => {
    flame.animate(
      [
        {
          transform: "scale(1)",
          filter: "drop-shadow(0 0 8px #ff9f35)"
        },
        {
          transform: "scale(1.65)",
          filter:
            "drop-shadow(0 0 25px #ffe199) drop-shadow(0 0 42px #9a4caf)"
        },
        {
          transform: "scale(1)",
          filter: "drop-shadow(0 0 8px #ff9f35)"
        }
      ],
      {
        duration: 1400,
        easing: "ease-out"
      }
    );
  });
}

function togglePause() {
  if (!game.loaded) return;

  game.paused = !game.paused;
  temple.classList.toggle("paused", game.paused);

  const pauseButton = document.getElementById("pauseBtn");
  pauseButton.textContent = game.paused ? "▶ Retomar" : "⏸ Pausar";
  statusText.textContent = game.paused ? "Pausado" : "Contemplando...";
}

function spawnParticles(amount, originX = 50, originY = 30) {
  const container = document.getElementById("particles");

  for (let index = 0; index < amount; index += 1) {
    const particle = document.createElement("span");
    particle.className = "particle";
    particle.style.left =
      `${originX + (Math.random() * 20 - 10)}%`;
    particle.style.bottom =
      `${originY + Math.random() * 9}%`;
    particle.style.animationDuration =
      `${1.8 + Math.random() * 2.5}s`;
    particle.style.animationDelay =
      `${Math.random() * 0.3}s`;

    container.appendChild(particle);
    setTimeout(() => particle.remove(), 4700);
  }
}

function gameLoop(now) {
  const deltaTime = Math.min((now - game.lastTime) / 1000, 0.033);
  game.lastTime = now;

  updatePlayer(deltaTime);
  updateAnimation(deltaTime);
  renderPlayer();
  drawPlayer();

  requestAnimationFrame(gameLoop);
}

const keyMap = {
  ArrowLeft: "left",
  a: "left",
  A: "left",
  ArrowRight: "right",
  d: "right",
  D: "right",
  ArrowUp: "up",
  w: "up",
  W: "up",
  ArrowDown: "down",
  s: "down",
  S: "down"
};

document.addEventListener("keydown", (event) => {
  const mapped = keyMap[event.key];

  if (mapped) {
    event.preventDefault();
    input[mapped] = true;
  }

  if (event.code === "Space") {
    event.preventDefault();
    jump();
  }

  if (event.key === "e" || event.key === "E") {
    event.preventDefault();
    offer();
  }

  if (event.key === "Escape") {
    togglePause();
  }
});

document.addEventListener("keyup", (event) => {
  const mapped = keyMap[event.key];

  if (mapped) {
    event.preventDefault();
    input[mapped] = false;
  }
});

document.querySelectorAll("[data-control]").forEach((button) => {
  const control = button.dataset.control;

  const press = (event) => {
    event.preventDefault();
    button.setPointerCapture?.(event.pointerId);
    button.classList.add("active");

    if (control === "jump") {
      jump();
    } else {
      input[control] = true;
    }
  };

  const release = (event) => {
    event.preventDefault();
    button.classList.remove("active");

    if (control !== "jump") {
      input[control] = false;
    }
  };

  button.addEventListener("pointerdown", press);
  button.addEventListener("pointerup", release);
  button.addEventListener("pointercancel", release);
  button.addEventListener("pointerleave", (event) => {
    if (event.buttons) release(event);
  });
});

document
  .getElementById("contemplateBtn")
  .addEventListener("click", contemplate);

document
  .getElementById("offerBtn")
  .addEventListener("click", offer);

document
  .getElementById("pauseBtn")
  .addEventListener("click", togglePause);

actionBtn.addEventListener("click", () => {
  if (game.nearAltar) {
    offer();
  } else {
    contemplate();
  }
});

window.addEventListener("blur", () => {
  Object.keys(input).forEach((key) => {
    input[key] = false;
  });
});

window.addEventListener("resize", () => {
  player.x = Math.max(
    45,
    Math.min(sanctum.clientWidth - 45, player.x)
  );
  renderPlayer();
});

setInterval(() => {
  if (game.loaded && !game.paused) {
    spawnParticles(1, Math.random() * 76 + 12, 24);
  }
}, 1000);

loadSprites().catch((error) => {
  console.error(error);
  loading.textContent = "ERRO AO CARREGAR OS SPRITES";
  statusText.textContent = "Falha nos arquivos";
  showPhrase(
    "Confirme se a pasta sprites está ao lado do arquivo index.html."
  );
});

requestAnimationFrame(gameLoop);

console.log(
  "Controles: WASD ou setas para mover, Espaço para pular e E para oferecer."
);
</script>
</body>
